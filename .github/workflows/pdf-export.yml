name: PDF Export

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  export-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc texlive-xetex

      - name: Assemble playbook
        run: |
          # Start with reading guide
          cat sections/00-reading-guide.md > /tmp/playbook-full.md

          # Concatenate all chapters in order: README first, then sections sorted
          for dir in sections/01-definition sections/02-installation sections/03-configuration sections/04-personalisation sections/05-maintenance sections/06-use-cases sections/07-localisation; do
            if [ -f "$dir/README.md" ]; then
              echo -e "\n\n---\n\n" >> /tmp/playbook-full.md
              cat "$dir/README.md" >> /tmp/playbook-full.md
            fi
            for f in $(ls "$dir"/*.md 2>/dev/null | grep -v README.md | sort); do
              echo -e "\n\n---\n\n" >> /tmp/playbook-full.md
              # Strip YAML frontmatter before appending
              sed '1{/^---$/!q;};1,/^---$/d' "$f" >> /tmp/playbook-full.md
            done
          done

          echo "Assembled $(wc -l < /tmp/playbook-full.md) lines from $(find sections -name '*.md' | wc -l) files"

      - name: Generate PDF
        run: |
          pandoc /tmp/playbook-full.md \
            -o PLAYBOOK.pdf \
            --pdf-engine=xelatex \
            -V geometry:margin=2cm \
            -V fontsize=11pt \
            --toc \
            --toc-depth=2 \
            -V title="The OpenClaw Field Playbook" \
            -V author="github.com/alexwill87/openclaw-field-playbook" \
            -V lang=fr

      - name: Upload PDF to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: PLAYBOOK.pdf

      - name: Save PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PLAYBOOK-pdf
          path: PLAYBOOK.pdf
