name: Deploy Playbook

on:
  push:
    branches:
      - main
    paths:
      - 'sections/**'
      - 'index_template.html'
      - 'assets/**'
      - '.github/scripts/build_site.py'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install markdown

      - name: Build index.html from sections
        run: python .github/scripts/build_site.py

      - name: Commit and push generated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to index.html"
          else
            git commit -m "build: regenerate index.html from sections"
            git push
          fi
