<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>OpenClaw Install Tracker</title>
<style>
:root {
  --text: #e5e5e5; --muted: #a1a1aa; --bg: #0a0a0a; --card: #141414;
  --border: #262626; --accent: #60a5fa; --green: #22c55e; --yellow: #eab308;
  --red: #ef4444; --purple: #a78bfa;
}
@media (prefers-color-scheme: light) {
  :root {
    --text: #1a1a1a; --muted: #666; --bg: #fff; --card: #f8f8f6;
    --border: #e0e0dc; --accent: #2563eb; --green: #16a34a; --yellow: #ca8a04;
    --red: #dc2626; --purple: #7c3aed;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Inter", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

header { padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 1rem; font-weight: 700; }
header .meta { font-size: 0.78rem; color: var(--muted); }

.tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 2rem; gap: 0; }
.tab { padding: 0.6rem 1.25rem; font-size: 0.82rem; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

.panel { display: none; padding: 1.5rem 2rem; max-width: 900px; }
.panel.active { display: block; }

/* Progress bar */
.progress { margin-bottom: 1.5rem; }
.progress-label { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.3rem; }
.progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.5s; }

/* Phase cards */
.phase { display: flex; align-items: flex-start; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
.phase:last-child { border-bottom: none; }
.phase-status { width: 80px; flex-shrink: 0; }
.phase-status select { width: 100%; padding: 0.25rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.78rem; background: var(--card); color: var(--text); }
.phase-info { flex: 1; }
.phase-name { font-weight: 600; font-size: 0.88rem; }
.phase-time { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }
.phase-notes { margin-top: 0.4rem; }
.phase-notes textarea { width: 100%; padding: 0.4rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.8rem; background: var(--card); color: var(--text); resize: vertical; min-height: 2rem; font-family: inherit; }

/* Status colors */
.badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
.badge-todo { background: var(--border); color: var(--muted); }
.badge-en_cours { background: #422006; color: var(--yellow); }
.badge-fait { background: #052e16; color: var(--green); }
.badge-skip { background: #1e1b4b; color: var(--purple); }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 0.5rem; }
th { text-align: left; padding: 0.5rem; border-bottom: 2px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted); }
td { padding: 0.5rem; border-bottom: 1px solid var(--border); vertical-align: top; }

/* Action log */
.action-item { padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
.action-time { color: var(--muted); font-size: 0.75rem; }
.action-result { font-weight: 600; }
.result-success { color: var(--green); }
.result-failure { color: var(--red); }
.result-warning { color: var(--yellow); }
.result-info { color: var(--accent); }

/* Forms */
.form-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
.form-row input, .form-row select, .form-row textarea { padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.82rem; background: var(--card); color: var(--text); font-family: inherit; }
.form-row input { flex: 1; min-width: 120px; }
.form-row textarea { flex: 1; min-width: 200px; min-height: 2.5rem; }
button.add { padding: 0.4rem 1rem; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-size: 0.82rem; cursor: pointer; }
button.add:hover { opacity: 0.85; }
.export-btn { padding: 0.3rem 0.75rem; border: 1px solid var(--border); border-radius: 4px; background: var(--card); color: var(--text); font-size: 0.78rem; cursor: pointer; margin-left: auto; }

@media (max-width: 640px) {
  .phase { flex-direction: column; gap: 0.5rem; }
  .phase-status { width: 100%; }
  .form-row { flex-direction: column; }
  header { flex-direction: column; gap: 0.5rem; }
}
</style>
</head>
<body>

<header>
  <h1>OpenClaw Install Tracker</h1>
  <div class="meta">
    <span id="progress-text">0/11 phases</span>
    <button class="export-btn" onclick="exportState()">Exporter JSON</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('phases')">Phases</button>
  <button class="tab" onclick="showTab('decisions')">Decisions</button>
  <button class="tab" onclick="showTab('services')">Services</button>
  <button class="tab" onclick="showTab('actions')">Actions</button>
</div>

<!-- PHASES -->
<div id="panel-phases" class="panel active">
  <div class="progress">
    <div class="progress-label" id="progress-label">Progression</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="phases-list"></div>
</div>

<!-- DECISIONS -->
<div id="panel-decisions" class="panel">
  <h2 style="font-size:1rem;margin-bottom:1rem;">Registre des decisions</h2>
  <div class="form-row">
    <input id="dec-question" placeholder="Question (ex: Vault ou .env ?)">
    <input id="dec-choice" placeholder="Choix fait">
    <input id="dec-reason" placeholder="Raison">
    <button class="add" onclick="addDecision()">Ajouter</button>
  </div>
  <table>
    <thead><tr><th>Question</th><th>Choix</th><th>Raison</th><th>Date</th></tr></thead>
    <tbody id="decisions-body"></tbody>
  </table>
</div>

<!-- SERVICES -->
<div id="panel-services" class="panel">
  <h2 style="font-size:1rem;margin-bottom:1rem;">Registre des services</h2>
  <div class="form-row">
    <input id="svc-id" placeholder="ID (ex: vault)">
    <input id="svc-name" placeholder="Nom">
    <input id="svc-port" placeholder="Port" type="number" style="width:80px;flex:none;">
    <select id="svc-status"><option value="not_installed">Non installe</option><option value="running">Running</option><option value="stopped">Stopped</option></select>
    <button class="add" onclick="addService()">Ajouter</button>
  </div>
  <table>
    <thead><tr><th>Service</th><th>Port</th><th>Acces</th><th>Statut</th><th>Docker</th></tr></thead>
    <tbody id="services-body"></tbody>
  </table>
</div>

<!-- ACTIONS -->
<div id="panel-actions" class="panel">
  <h2 style="font-size:1rem;margin-bottom:1rem;">Log des actions</h2>
  <div class="form-row">
    <input id="act-action" placeholder="Action executee">
    <select id="act-result"><option value="success">Succes</option><option value="failure">Echec</option><option value="warning">Warning</option><option value="info">Info</option></select>
    <input id="act-details" placeholder="Details">
    <button class="add" onclick="addAction()">Ajouter</button>
  </div>
  <div id="actions-list"></div>
</div>

<script>
var API = '';

function showTab(name) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('panel-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ========== PHASES ==========
function loadPhases() {
  fetch(API + '/api/phases').then(function(r) { return r.json(); }).then(function(phases) {
    var done = phases.filter(function(p) { return p.status === 'fait'; }).length;
    var total = phases.length;
    var pct = Math.round((done / total) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = done + '/' + total + ' phases';
    document.getElementById('progress-label').textContent = pct + '% complete';

    var html = '';
    phases.forEach(function(p) {
      var timeInfo = '';
      if (p.started_at) timeInfo += 'Debut: ' + new Date(p.started_at).toLocaleString('fr-FR');
      if (p.finished_at) timeInfo += ' | Fin: ' + new Date(p.finished_at).toLocaleString('fr-FR');

      html += '<div class="phase">' +
        '<div class="phase-status">' +
          '<select onchange="updatePhase(\'' + p.id + '\', this.value)">' +
            '<option value="todo"' + (p.status === 'todo' ? ' selected' : '') + '>A faire</option>' +
            '<option value="en_cours"' + (p.status === 'en_cours' ? ' selected' : '') + '>En cours</option>' +
            '<option value="fait"' + (p.status === 'fait' ? ' selected' : '') + '>Fait</option>' +
            '<option value="skip"' + (p.status === 'skip' ? ' selected' : '') + '>Skip</option>' +
          '</select>' +
        '</div>' +
        '<div class="phase-info">' +
          '<div class="phase-name">' + p.name + '</div>' +
          (timeInfo ? '<div class="phase-time">' + timeInfo + '</div>' : '') +
          '<div class="phase-notes"><textarea placeholder="Notes..." onblur="updateNotes(\'' + p.id + '\', this.value)">' + (p.notes || '') + '</textarea></div>' +
        '</div>' +
      '</div>';
    });
    document.getElementById('phases-list').innerHTML = html;
  });
}

function updatePhase(id, status) {
  fetch(API + '/api/phases/' + id, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: status }) })
    .then(function() { loadPhases(); loadActions(); });
}

function updateNotes(id, notes) {
  fetch(API + '/api/phases/' + id, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ notes: notes }) });
}

// ========== DECISIONS ==========
function loadDecisions() {
  fetch(API + '/api/decisions').then(function(r) { return r.json(); }).then(function(decs) {
    var html = '';
    decs.forEach(function(d) {
      html += '<tr><td>' + d.question + '</td><td><strong>' + (d.choice || '') + '</strong></td><td>' + (d.reason || '') + '</td><td style="font-size:0.75rem;color:var(--muted);">' + new Date(d.created_at).toLocaleDateString('fr-FR') + '</td></tr>';
    });
    document.getElementById('decisions-body').innerHTML = html || '<tr><td colspan="4" style="color:var(--muted);">Aucune decision enregistree</td></tr>';
  });
}

function addDecision() {
  var q = document.getElementById('dec-question').value;
  if (!q) return;
  fetch(API + '/api/decisions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({
    question: q, choice: document.getElementById('dec-choice').value, reason: document.getElementById('dec-reason').value
  })}).then(function() { document.getElementById('dec-question').value = ''; document.getElementById('dec-choice').value = ''; document.getElementById('dec-reason').value = ''; loadDecisions(); });
}

// ========== SERVICES ==========
function loadServices() {
  fetch(API + '/api/services').then(function(r) { return r.json(); }).then(function(svcs) {
    var html = '';
    svcs.forEach(function(s) {
      var statusClass = s.status === 'running' ? 'result-success' : s.status === 'stopped' ? 'result-failure' : 'result-info';
      html += '<tr><td><strong>' + s.name + '</strong></td><td>' + (s.port || '-') + '</td><td>' + (s.access_type || '-') + '</td><td class="' + statusClass + '">' + s.status + '</td><td>' + (s.docker_container || '-') + '</td></tr>';
    });
    document.getElementById('services-body').innerHTML = html || '<tr><td colspan="5" style="color:var(--muted);">Aucun service enregistre</td></tr>';
  });
}

function addService() {
  var id = document.getElementById('svc-id').value;
  if (!id) return;
  fetch(API + '/api/services/' + id, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({
    name: document.getElementById('svc-name').value || id, port: parseInt(document.getElementById('svc-port').value) || null, status: document.getElementById('svc-status').value
  })}).then(function() { document.getElementById('svc-id').value = ''; document.getElementById('svc-name').value = ''; document.getElementById('svc-port').value = ''; loadServices(); });
}

// ========== ACTIONS ==========
function loadActions() {
  fetch(API + '/api/actions?limit=50').then(function(r) { return r.json(); }).then(function(acts) {
    var html = '';
    acts.forEach(function(a) {
      html += '<div class="action-item"><span class="action-result result-' + a.result + '">[' + a.result.toUpperCase() + ']</span> ' + a.action + (a.details ? ' — ' + a.details : '') + '<div class="action-time">' + new Date(a.created_at).toLocaleString('fr-FR') + (a.phase_id ? ' | ' + a.phase_id : '') + '</div></div>';
    });
    document.getElementById('actions-list').innerHTML = html || '<div style="color:var(--muted);">Aucune action enregistree</div>';
  });
}

// ========== EXPORT ==========
function exportState() {
  fetch(API + '/api/state').then(function(r) { return r.json(); }).then(function(data) {
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'install-state.json'; a.click();
  });
}

// ========== INIT ==========
loadPhases(); loadDecisions(); loadServices(); loadActions();
setInterval(function() { loadPhases(); loadActions(); }, 30000);
</script>

</body>
</html>
